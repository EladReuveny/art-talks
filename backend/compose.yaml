services:
  server:
    build:
      context: .
    env_file:
      - './.env.docker'
    ports:
      - 3000:3000

    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - './.env.docker'
    volumes:
      - db-data:/var/lib/postgresql
    expose:
      - 5432
    healthcheck:
      test: ['CMD', 'pg_isready']
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  db-data:
